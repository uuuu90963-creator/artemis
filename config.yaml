name: artemis
version: 0.1.0

# API Keys - 实际存储在 ~/.hermes/.env 文件中
# 支持的 Provider:
#   - minimax: MiniMax 国内版 (abab6.5s-chat)
#   - openrouter: OpenRouter (GPT-4o-mini/Claude/Gemini 等，按量计费)
#   - deepseek: DeepSeek (deepseek-chat)
#   - anthropic: Anthropic Claude (Claude-3.5-Haiku/Sonnet/Opus)
#   - google: Google Gemini (gemini-2.0-flash 等)
#
# .env 文件格式示例:
#   MINIMAX_API_KEY=your_key_here
#   OPENROUTER_API_KEY=sk-or-v1_xxx
#   DEEPSEEK_API_KEY=sk-xxx
#   ANTHROPIC_API_KEY=sk-ant-api03-xxx
#   GEMINI_API_KEY=AIzaxxx
#   TELEGRAM_BOT_TOKEN=123456:ABC-DEFxxx

# 路由策略
routing:
  # 文字任务默认用 MiniMax
  text_default: minimax
  # 视觉任务用双通道
  vision_primary: openrouter   # gpt-4o-mini 做精细分析
  vision_fallback: local       # 本地ollama快速兜底
  # 升级阈值
  upgrade_threshold: medium     # simple/medium/complex/critical

# 记忆配置
memory:
  type: sqlite               # sqlite + 内置向量（不用外部向量库）
  path: memories/memory.db
  embedding_model: text-embedding-3-small  # 或MiniMax的embedding
  max_entries: 10000

# 技能配置
skills:
  directory: skills
  marketplace: https://artemis-skills.market

# 进化配置
evolution:
  enabled: true
  反思_after_tasks: 3          # 每N个任务后反思一次
  log_dir: logs/evolution

# 工作空间
workspace:
  path: workspace
  agents_md: AGENTS.md
