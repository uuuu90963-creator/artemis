_schema_version: 1
model:
  text: minimax:abab6.5s-chat
  vision: openrouter:openai/gpt-4o-mini
  reasoning: openrouter:openai/gpt-4o-mini
routing:
  text_default: minimax
  vision_primary: openrouter
  vision_fallback: local
tools:
  enabled_toolsets:
  - file
  - memory
  - web
  disabled_tools: []
  max_file_size_mb: 10
  terminal_timeout: 60
memory:
  db_path: ~/.hermes/artemis/memories/memory.db
  max_memories: 10000
  similarity_threshold: 0.01
telegram:
  enabled: false
  allowed_users: []
  reply_to_message: true
  streaming: false
agent:
  max_turns: 20
  max_tokens_per_message: 500
  context_window: 128000
  auto_save: true
security:
  approve_all: false
  block_high_danger: true
  dangerous_commands_log: ~/.hermes/artemis/logs/commands.log
display:
  show_cost: true
  show_provider: true
  show_thinking: false
upgrade:
  auto_upgrade: false     # true=自动静默升级，false=只通知用户确认
  silent: false           # true=完全不打扰，false=有更新时通知
  notify_on_startup: true  # 启动时是否检查并通知
  github_repo: uuuu90963-creator/artemis
